<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <title>Личный кабинет</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Montserrat", sans-serif;
                background: rgb(77, 77, 77);
                min-height: 100vh;
                font-weight: 500; 
            }

            /* Шапка */
            .header {
                background: #1a1a2e;
                color: white;
                padding: 16px 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
            }

            .header h1 {
                font-size: 20px;
                font-weight: 600;
                letter-spacing: 0.5px;
            }

            .header-actions {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .btn {
                padding: 8px 18px;
                border: none;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                text-decoration: none;
                display: inline-block;
                transition: 0.2s;
            }

            .btn-primary {
                background: #ea66d6;
                color: white;
            }

            .btn-danger {
                background: #c54436;
                color: white;
            }

            /* Контейнер */
            .container {
                max-width: 820px;
                margin: 24px auto;
                padding: 0 20px;
            }

            .page-title {
                font-size: 20px;
                font-weight: 600;
                color: #1a1a2e;
                margin-bottom: 18px;
            }

            /* ===== СЛАЙДЕР ===== */
            .slider-container {
                position: relative;
                margin-bottom: 24px;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            }

            .slider {
                display: flex;
                transition: transform 0.5s ease;
            }

            .slide {
                min-width: 100%;
            }

            .slide img {
                width: 100%;
                height: 200px;
                object-fit: cover;
                display: block;
            }

            .slider-btn {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                background: rgba(0, 0, 0, 0.45);
                color: white;
                border: none;
                padding: 8px 14px;
                cursor: pointer;
                font-size: 18px;
                border-radius: 50%;
                transition: 0.2s;
                z-index: 2;
            }

            .slider-btn:hover {
                background: rgba(0, 0, 0, 0.75);
            }

            .slider-btn.prev {
                left: 10px;
            }

            .slider-btn.next {
                right: 10px;
            }

            .slider-dots {
                text-align: center;
                padding: 10px;
                background: rgba(0, 0, 0, 0.4);
                position: absolute;
                bottom: 0;
                width: 100%;
            }

            .dot {
                display: inline-block;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.4);
                margin: 0 5px;
                cursor: pointer;
                transition: 0.2s;
            }

            .dot.active {
                background: white;
            }

            /* ===== КАРТОЧКА ЗАЯВКИ ===== */
            .request-card {
                background: rgb(180, 180, 180);
                border-radius: 12px;
                padding: 16px 20px;
                margin-bottom: 12px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
                border: 1px solid #000000;
                transition: 0.15s;
            }

            .request-card:hover {
                border-color: #d0d3dd;
            }

            .request-row {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: space-between;
                gap: 8px 12px;
            }

            .request-transport {
                font-weight: 600;
                color: #1a1a2e;
                font-size: 16px;
            }

            .request-meta {
                display: flex;
                flex-wrap: wrap;
                gap: 10px 18px;
                font-size: 14px;
                color: #555;
            }

            .request-meta span {
                display: inline-flex;
                align-items: center;
                gap: 4px;
            }

            /* Статусы */
            .status {
                display: inline-block;
                padding: 3px 12px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
                white-space: nowrap;
            }

            .status-new {
                background: #fff3cd;
                color: #856404;
            }

            .status-learning {
                background: #d1ecf1;
                color: #0c5460;
            }

            .status-completed {
                background: #d4edda;
                color: #155724;
            }

            /* Отзыв */
            .feedback-block {
                margin-top: 10px;
                padding-top: 10px;
                border-top: 1px solid #edf0f5;
            }

            .feedback-label {
                font-weight: 600;
                font-size: 13px;
                color: #333;
            }

            .feedback-text {
                font-size: 14px;
                color: #444;
                background: #f8f9fc;
                padding: 8px 12px;
                border-radius: 8px;
                margin-top: 4px;
            }

            textarea {
                width: 100%;
                padding: 8px 12px;
                border: 1.5px solid #e0e0e0;
                border-radius: 8px;
                font-family: inherit;
                font-size: 14px;
                resize: vertical;
                background: #fafbfc;
                transition: 0.2s;
            }

            textarea:focus {
                outline: none;
                border-color: #6c63ff;
                background: white;
            }

            .btn-feedback {
                margin-top: 6px;
                background: #28a745;
                color: white;
                padding: 6px 16px;
                border: none;
                border-radius: 6px;
                font-weight: 600;
                font-size: 13px;
                cursor: pointer;
            }

            .btn-feedback:hover {
                background: #218838;
            }

            /* Пусто */
            .empty {
                text-align: center;
                padding: 40px 20px;
                background: white;
                border-radius: 12px;
                color: #888;
                border: 1px solid #eef0f4;
            }

            .empty a {
                color: #6c63ff;
                text-decoration: none;
                font-weight: 600;
            }

            .empty a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <!-- Шапка -->
        <div class="header">
            <h1>транспорт</h1>
            <div class="header-actions">
                <a href="newrequest.html" class="btn btn-primary"
                    >Новая заявка</a
                >
                <button onclick="logout()" class="btn btn-danger">Выйти</button>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="container">
            <div class="page-title">Мои заявки</div>

            <!-- ===== СЛАЙДЕР ===== -->
            <div class="slider-container">
                <div class="slider" id="slider">
                    <div class="slide">
                        <img
                            src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=800&h=200&fit=crop"
                            alt="Автобус"
                        />
                    </div>
                    <div class="slide">
                        <img
                            src="https://images.unsplash.com/photo-1570125909232-263b7d7f5a3e?w=800&h=200&fit=crop"
                            alt="Электробус"
                        />
                    </div>
                    <div class="slide">
                        <img
                            src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=800&h=200&fit=crop"
                            alt="Трамвай"
                        />
                    </div>
                    <div class="slide">
                        <img
                            src="https://images.unsplash.com/photo-1580674285054-bed31e145f59?w=800&h=200&fit=crop"
                            alt="Обучение"
                        />
                    </div>
                </div>
                <button class="slider-btn prev" onclick="prevSlide()">❮</button>
                <button class="slider-btn next" onclick="nextSlide()">❯</button>
                <div class="slider-dots" id="dots"></div>
            </div>

            <!-- Список заявок -->
            <div id="requestsList"></div>
        </div>

        <script>
            const API_URL = "http://localhost:3000/api";
            const userId = localStorage.getItem("userId");

            if (!userId) {
                window.location.href = "login.html";
            }

            // ========== СЛАЙДЕР ==========
            let currentSlide = 0;
            let slideInterval;
            const slides = document.querySelectorAll(".slide");
            const totalSlides = slides.length;

            function showSlide(index) {
                if (index >= totalSlides) currentSlide = 0;
                if (index < 0) currentSlide = totalSlides - 1;

                const slider = document.getElementById("slider");
                slider.style.transform = `translateX(-${currentSlide * 100}%)`;

                updateDots();
            }

            function nextSlide() {
                currentSlide++;
                showSlide(currentSlide);
                resetAutoSlide();
            }

            function prevSlide() {
                currentSlide--;
                showSlide(currentSlide);
                resetAutoSlide();
            }

            function startAutoSlide() {
                slideInterval = setInterval(() => {
                    currentSlide++;
                    showSlide(currentSlide);
                }, 3000);
            }

            function resetAutoSlide() {
                clearInterval(slideInterval);
                startAutoSlide();
            }

            function updateDots() {
                const dotsContainer = document.getElementById("dots");
                dotsContainer.innerHTML = "";
                for (let i = 0; i < totalSlides; i++) {
                    const dot = document.createElement("div");
                    dot.className =
                        "dot" + (i === currentSlide ? " active" : "");
                    dot.onclick = () => {
                        currentSlide = i;
                        showSlide(currentSlide);
                        resetAutoSlide();
                    };
                    dotsContainer.appendChild(dot);
                }
            }

            // ========== ЗАГРУЗКА ЗАЯВОК ==========
            async function loadRequests() {
                try {
                    const res = await fetch(
                        `${API_URL}/requests/user/${userId}`,
                    );
                    const data = await res.json();

                    const container = document.getElementById("requestsList");

                    if (!Array.isArray(data)) {
                        container.innerHTML = `<div class="empty">Ошибка загрузки</div>`;
                        return;
                    }

                    if (data.length === 0) {
                        container.innerHTML = `
                        <div class="empty">
                            У вас пока нет заявок.<br><br>
                            <a href="new-request.html">Создать первую заявку</a>
                        </div>
                    `;
                        return;
                    }

                    container.innerHTML = data
                        .map((req) => {
                            const statusClass =
                                req.status_requests === "Новая"
                                    ? "status-new"
                                    : req.status_requests === "Идет обучение"
                                      ? "status-learning"
                                      : "status-completed";

                            return `
                        <div class="request-card">
                            <div class="request-row">
                                <span class="request-transport">${req.type_transport}</span>
                                <span class="status ${statusClass}">${req.status_requests}</span>
                            </div>
                            <div class="request-row" style="margin-top:6px;">
                                <div class="request-meta">
                                    <span>📅 ${new Date(req.start_requests).toLocaleDateString("ru-RU")}</span>
                                    <span>💳 ${req.payment_requests}</span>
                                </div>
                            </div>

                            ${
                                req.feedback
                                    ? `
                                <div class="feedback-block">
                                    <div class="feedback-label">Ваш отзыв</div>
                                    <div class="feedback-text">${escapeHtml(req.feedback)}</div>
                                </div>
                            `
                                    : req.status_requests ===
                                        "Обучение завершено"
                                      ? `
                                <div class="feedback-block">
                                    <div class="feedback-label">Оставить отзыв</div>
                                    <textarea id="feedback-${req.requests_id}" rows="2" placeholder="Расскажите о своём обучении..."></textarea>
                                    <button class="btn-feedback" onclick="addFeedback(${req.requests_id})"> Отправить</button>
                                </div>
                            `
                                      : ""
                            }
                        </div>
                    `;
                        })
                        .join("");
                } catch (error) {
                    document.getElementById("requestsList").innerHTML =
                        `<div class="empty">Ошибка подключения</div>`;
                }
            }

            // ========== ОТЗЫВ ==========
            async function addFeedback(requestId) {
                const textarea = document.getElementById(
                    `feedback-${requestId}`,
                );
                const feedback = textarea.value.trim();

                if (!feedback) {
                    alert("Напишите отзыв");
                    return;
                }

                try {
                    const res = await fetch(
                        `${API_URL}/requests/${requestId}/feedback`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                feedback,
                                userId: parseInt(userId),
                            }),
                        },
                    );

                    if (res.ok) {
                        alert("Спасибо за отзыв!");
                        loadRequests();
                    } else {
                        const err = await res.json();
                        alert(
                            "Ошибка: " + (err.error || "что-то пошло не так"),
                        );
                    }
                } catch (error) {
                    alert("Ошибка подключения");
                }
            }

            // ========== ЗАЩИТА ОТ XSS ==========
            function escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            // ========== ВЫХОД ==========
            function logout() {
                localStorage.clear();
                window.location.href = "login.html";
            }

            // ========== ЗАПУСК ==========
            loadRequests();
            startAutoSlide();
            showSlide(0);
        </script>
    </body>
</html>
