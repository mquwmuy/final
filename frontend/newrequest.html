<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новая заявка - Пассажирам.РФ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: Arial;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #ea66d6;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ea66d6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #d455c2;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #ea66d6;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 Новая заявка на обучение</h2>
        
        <div class="success" id="successMessage">✅ Заявка успешно отправлена!</div>
        
        <form id="requestForm">
            <div class="form-group">
                <label>🚌 Вид транспорта</label>
                <select id="transportId" required>
                    <option value="">Выберите транспорт...</option>
                </select>
            </div>

            <div class="form-group">
                <label>📅 Дата начала обучения</label>
                <input type="date" id="startDate" required>
            </div>

            <div class="form-group">
                <label>💳 Способ оплаты</label>
                <select id="paymentMethod" required>
                    <option value="">Выберите способ...</option>
                    <option value="Наличные">💰 Наличные</option>
                    <option value="Сбп">🏦 СБП (Система быстрых платежей)</option>
                    <option value="СберБанк">💳 СберБанк</option>
                    <option value="Т-Банк">💳 Т-Банк</option>
                </select>
            </div>

            <div class="error" id="errorMessage"></div>

            <button type="submit">Отправить заявку</button>
        </form>

        <a href="dashboard.html" class="back-link">← Вернуться в личный кабинет</a>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const userId = localStorage.getItem('userId');
        
        // Проверка: если пользователь не залогинен - отправляем на вход
        if (!userId) {
            window.location.href = 'login.html';
        }

        // ========== ЗАГРУЗКА СПИСКА ТРАНСПОРТА ==========
        async function loadTransports() {
            try {
                const response = await fetch(`${API_URL}/requests/transports`);
                const transports = await response.json();
                
                const select = document.getElementById('transportId');
                transports.forEach(transport => {
                    const option = document.createElement('option');
                    option.value = transport.transport_id;
                    option.textContent = transport.type_transport;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Ошибка загрузки транспорта:', error);
                document.getElementById('errorMessage').textContent = 'Ошибка загрузки списка транспорта';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        // ========== ОТПРАВКА ЗАЯВКИ ==========
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Скрываем предыдущие сообщения
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            
            // Собираем данные
            const transportId = document.getElementById('transportId').value;
            const startDate = document.getElementById('startDate').value;
            const paymentMethod = document.getElementById('paymentMethod').value;
            
            // Проверка на заполнение
            if (!transportId) {
                document.getElementById('errorMessage').textContent = 'Выберите вид транспорта';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            if (!startDate) {
                document.getElementById('errorMessage').textContent = 'Выберите дату начала обучения';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            if (!paymentMethod) {
                document.getElementById('errorMessage').textContent = 'Выберите способ оплаты';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            // Проверка: дата не может быть в прошлом
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const selectedDate = new Date(startDate);
            
            if (selectedDate < today) {
                document.getElementById('errorMessage').textContent = 'Дата начала обучения не может быть в прошлом';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            const data = {
                userId: parseInt(userId),
                transportId: parseInt(transportId),
                startDate: startDate,
                paymentMethod: paymentMethod
            };
            
            try {
                const response = await fetch(`${API_URL}/requests`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Показываем сообщение об успехе
                    document.getElementById('successMessage').style.display = 'block';
                    
                    // Через 1.5 секунды возвращаемся в личный кабинет
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    document.getElementById('errorMessage').textContent = result.error || 'Ошибка при создании заявки';
                    document.getElementById('errorMessage').style.display = 'block';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('errorMessage').textContent = 'Ошибка подключения к серверу';
                document.getElementById('errorMessage').style.display = 'block';
            }
        });

        // ========== УСТАНАВЛИВАЕМ МИНИМАЛЬНУЮ ДАТУ (сегодня) ==========
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').min = today;
        
        // Загружаем список транспорта
        loadTransports();
    </script>
</body>
</html>
