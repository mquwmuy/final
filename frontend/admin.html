<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h1 { color: #333; }
        h2 { color: #ea66d6; font-size: 18px; }
        
        /* Форма входа */
        .login-box {
            max-width: 300px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .login-box button {
            width: 100%;
            padding: 10px;
            background: #ea66d6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        /* Таблица */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #333;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        
        /* Статусы */
        .status-new { background: #ffc107; padding: 3px 8px; border-radius: 15px; font-size: 12px; }
        .status-learning { background: #17a2b8; color: white; padding: 3px 8px; border-radius: 15px; font-size: 12px; }
        .status-completed { background: #28a745; color: white; padding: 3px 8px; border-radius: 15px; font-size: 12px; }
        
        /* Фильтры */
        .filters {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        .filters select, .filters button {
            padding: 8px 15px;
        }
        
        /* Пагинация */
        .pagination {
            margin-top: 20px;
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        .pagination button {
            padding: 5px 10px;
            cursor: pointer;
        }
        
        .logout-btn {
            float: right;
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>

<!-- Форма входа (показывается сначала) -->
<div id="loginForm" class="login-box">
    <h2>Вход для администратора</h2>
    <input type="text" id="login" placeholder="Логин" value="Admin26">
    <input type="password" id="password" placeholder="Пароль" value="Demo20">
    <button onclick="adminLogin()">Войти</button>
    <div id="loginError" class="error"></div>
    <p style="margin-top: 15px;"><a href="login.html">← Обычный вход</a></p>
</div>

<!-- Админ-панель (скрыта сначала) -->
<div id="adminPanel" style="display: none;">
    <div class="container">
        <button class="logout-btn" onclick="logout()">Выйти</button>
        <h1>Панель администратора</h1>
        <h2>Управление заявками на обучение</h2>
        
        <div class="filters">
            <select id="statusFilter">
                <option value="все">Все статусы</option>
                <option value="Новая">Новая</option>
                <option value="Идет обучение">Идет обучение</option>
                <option value="Обучение завершено">Обучение завершено</option>
            </select>
            <button onclick="loadRequests()">Применить</button>
            <button onclick="resetFilters()">Сбросить</button>
        </div>
        
        <div id="requestsList">Загрузка...</div>
        <div id="pagination" class="pagination"></div>
    </div>
</div>

<script>
    let currentPage = 1;
    
    // Вход в админку
    async function adminLogin() {
        const login = document.getElementById('login').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await fetch('http://localhost:3000/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });
            
            const result = await response.json();
            
            if (response.ok) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadRequests();
            } else {
                document.getElementById('loginError').innerText = result.error;
            }
        } catch (error) {
            document.getElementById('loginError').innerText = 'Ошибка подключения';
        }
    }
    
    // Загрузка заявок
    async function loadRequests() {
        const status = document.getElementById('statusFilter').value;
        const url = `http://localhost:3000/api/admin/requests?status=${status}&page=${currentPage}&limit=10`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            displayRequests(data.requests);
            displayPagination(data);
        } catch (error) {
            document.getElementById('requestsList').innerHTML = '<p>Ошибка загрузки</p>';
        }
    }
    
    // Отображение заявок в таблице
    function displayRequests(requests) {
        if (requests.length === 0) {
            document.getElementById('requestsList').innerHTML = '<p>Нет заявок</p>';
            return;
        }
        
        let html = `
            <table>
                <tr>
                    <th>ID</th>
                    <th>Пользователь</th>
                    <th>Транспорт</th>
                    <th>Дата</th>
                    <th>Оплата</th>
                    <th>Статус</th>
                    <th>Действие</th>
                </tr>
        `;
        
        requests.forEach(req => {
            // Определяем цвет статуса
            let statusClass = '';
            if (req.status_requests === 'Новая') statusClass = 'status-new';
            else if (req.status_requests === 'Идет обучение') statusClass = 'status-learning';
            else statusClass = 'status-completed';
            
            html += `
                <tr>
                    <td>${req.requests_id}</td>
                    <td>${req.last_name_user} ${req.name_user}</td>
                    <td>${req.type_transport}</td>
                    <td>${new Date(req.start_requests).toLocaleDateString()}</td>
                    <td>${req.payment_requests}</td>
                    <td><span class="${statusClass}">${req.status_requests}</span></td>
                    <td>
                        <select onchange="changeStatus(${req.requests_id}, this.value)">
                            <option value="Новая" ${req.status_requests === 'Новая' ? 'selected' : ''}>Новая</option>
                            <option value="Идет обучение" ${req.status_requests === 'Идет обучение' ? 'selected' : ''}>Идет обучение</option>
                            <option value="Обучение завершено" ${req.status_requests === 'Обучение завершено' ? 'selected' : ''}>Обучение завершено</option>
                        </select>
                    </td>
                </tr>
            `;
        });
        
        html += `</table>`;
        document.getElementById('requestsList').innerHTML = html;
    }
    
    // Изменение статуса
    async function changeStatus(requestId, newStatus) {
        try {
            const response = await fetch(`http://localhost:3000/api/admin/requests/${requestId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            
            if (response.ok) {
                alert('Статус изменён!');
                loadRequests(); // обновляем таблицу
            } else {
                const error = await response.json();
                alert('Ошибка: ' + error.error);
            }
        } catch (error) {
            alert('Ошибка подключения');
        }
    }
    
    // Пагинация (кнопки страниц)
    function displayPagination(data) {
        if (data.totalPages <= 1) {
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        
        let html = '';
        for (let i = 1; i <= data.totalPages; i++) {
            html += `<button onclick="goToPage(${i})" style="background: ${i === data.page ? '#ea66d6' : '#ccc'}">${i}</button>`;
        }
        document.getElementById('pagination').innerHTML = html;
    }
    
    function goToPage(page) {
        currentPage = page;
        loadRequests();
    }
    
    function resetFilters() {
        document.getElementById('statusFilter').value = 'все';
        currentPage = 1;
        loadRequests();
    }
    
    function logout() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        currentPage = 1;
    }
</script>

</body>
</html>
